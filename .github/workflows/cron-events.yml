name: 배당 이벤트 수집

on:
  schedule:
    # 일요일 10:00 KST = 일요일 01:00 UTC
    - cron: "0 1 * * 0"
  workflow_dispatch:

jobs:
  collect-events:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Events Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-events" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
