name: 미국 시장 데이터 수집

on:
  schedule:
    # 장마감 직후 1회: 16:15 ET = 21:15 UTC (월~금)
    - cron: "15 21 * * 1-5"
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_URL:
        required: true
      CRON_SECRET:
        required: true

jobs:
  collect-us-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger US Data Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-us-quotes" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
