name: 미국 시장 데이터 수집

on:
  schedule:
    # 미국 장중 (22:30~05:00 KST = 13:30~20:00 UTC), 15분 간격
    - cron: "*/15 13-20 * * 1-5"
    # 미국 장마감 일봉 (05:00 KST 다음날 = 20:00 UTC)
    - cron: "0 20 * * 1-5"
    # 환율 수집 (매시간)
    - cron: "0 * * * *"
    # 뉴스 수집 (30분 간격)
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  collect-us-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger US Data Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-us-quotes" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  collect-news:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *'
    steps:
      - name: Trigger News Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-news" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
