name: 미국 시장 데이터 수집

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_URL:
        required: true
      CRON_SECRET:
        required: true
      DATABASE_URL:
        required: true
      DIRECT_URL:
        required: true

jobs:
  collect-us-quotes:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run US quotes collection
        run: npx tsx scripts/collect-us-quotes.ts
