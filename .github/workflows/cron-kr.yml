name: 한국 시장 데이터 수집

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_URL:
        required: true
      CRON_SECRET:
        required: true

jobs:
  collect-kr-kospi:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KOSPI Quote Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-kr-quotes?exchange=KOSPI" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  collect-kr-kosdaq:
    needs: collect-kr-kospi
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KOSDAQ Quote Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-kr-quotes?exchange=KOSDAQ" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
