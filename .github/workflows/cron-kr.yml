name: 한국 시장 데이터 수집

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_URL:
        required: true
      CRON_SECRET:
        required: true

jobs:
  collect-kr-kospi:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KOSPI Quote Collection
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/collect-kr-quotes?exchange=KOSPI" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 65)
          echo "HTTP $HTTP_CODE"
          cat response.json 2>/dev/null || true
          echo ""
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ KOSPI collection succeeded"
            exit 0
          fi
          if [ "$HTTP_CODE" = "504" ]; then
            echo "⚠️ KOSPI function timeout (504) — MarketIndex saved, OHLCV may be incomplete"
            exit 0
          fi
          echo "❌ KOSPI collection failed with HTTP $HTTP_CODE"
          exit 1

  collect-kr-kosdaq:
    needs: collect-kr-kospi
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KOSDAQ Quote Collection
        run: |
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X POST \
            "${{ secrets.APP_URL }}/api/cron/collect-kr-quotes?exchange=KOSDAQ" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 65)
          echo "HTTP $HTTP_CODE"
          cat response.json 2>/dev/null || true
          echo ""
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ KOSDAQ collection succeeded"
            exit 0
          fi
          if [ "$HTTP_CODE" = "504" ]; then
            echo "⚠️ KOSDAQ function timeout (504) — OHLCV may be incomplete"
            exit 0
          fi
          echo "❌ KOSDAQ collection failed with HTTP $HTTP_CODE"
          exit 1
