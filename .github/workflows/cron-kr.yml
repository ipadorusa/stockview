name: 한국 시장 데이터 수집

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_URL:
        required: true
      CRON_SECRET:
        required: true

jobs:
  collect-kr-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KR Quote Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-kr-quotes" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
