name: 한국 시장 데이터 수집

on:
  schedule:
    # 장마감 후 1회 수집: 16:00 KST = 07:00 UTC, 평일(월~금)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  collect-kr-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger KR Quote Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-kr-quotes" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
