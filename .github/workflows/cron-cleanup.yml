name: 데이터 정리

on:
  schedule:
    # 일요일 05:00 KST = 토요일 20:00 UTC
    - cron: "0 20 * * 0"
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Data Cleanup
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/cleanup" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
