name: 종목 마스터 동기화

on:
  schedule:
    # 토요일 22:00 KST = 토요일 13:00 UTC
    - cron: "0 13 * * 6"
  workflow_dispatch:

jobs:
  collect-master:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Master Sync
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-master" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
