name: 기술적 지표 계산

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      APP_URL:
        required: true
      CRON_SECRET:
        required: true

jobs:
  compute-indicators:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Indicator Computation
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/compute-indicators" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
