name: 한국 데이터 파이프라인 (quotes → indicators)

on:
  schedule:
    # 장마감 후: 16:00 KST = 07:00 UTC, 평일
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  quotes:
    uses: ./.github/workflows/cron-kr.yml
    secrets:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

  indicators:
    needs: quotes
    uses: ./.github/workflows/cron-indicators.yml
    secrets:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
