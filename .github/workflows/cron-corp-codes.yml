name: OpenDART 기업코드 동기화

on:
  schedule:
    # 토요일 22:30 KST = 토요일 13:30 UTC (collect-master 이후)
    - cron: "30 13 * * 6"
  workflow_dispatch:

jobs:
  sync-corp-codes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scripts/sync-corp-codes.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
