name: OpenDART 배당 수집

on:
  schedule:
    # 분기별: 1/15, 4/15, 7/15, 10/15 10:00 KST = 01:00 UTC
    - cron: "0 1 15 1,4,7,10 *"
  workflow_dispatch:

jobs:
  collect-dart-dividends:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsx scripts/collect-dart-dividends.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
