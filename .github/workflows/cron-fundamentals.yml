name: 펀더멘탈 데이터 수집

on:
  schedule:
    # 평일 23:00 KST = 14:00 UTC (관심종목 우선 수집)
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  collect-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Fundamentals Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-fundamentals" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
