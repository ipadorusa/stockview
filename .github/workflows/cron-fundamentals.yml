name: 펀더멘탈 데이터 수집

on:
  schedule:
    # 일요일 08:00 KST = 토요일 23:00 UTC
    - cron: "0 23 * * 6"
  workflow_dispatch:

jobs:
  collect-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Fundamentals Collection
        run: |
          curl -X POST "${{ secrets.APP_URL }}/api/cron/collect-fundamentals" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
